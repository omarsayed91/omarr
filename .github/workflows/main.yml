name: RDP

on:
  workflow_dispatch:
  repository_dispatch:
    types: [CalledWorkflow]

jobs:
  secure-rdp:
    runs-on: windows-latest
    strategy:
      max-parallel: 1
      matrix:
        run-id: [1, 2, 3, 4]

    steps:
      # Check out repository code first
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Execute Task
        run: |
          echo "Running iteration number ${{ matrix.run-id }}"
          # Add your script or command here

      - name: Name
        run: |
          $ComputerName = "mqlhub000007"
   
          Remove-ItemProperty -path "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters" -name "Hostname" 
          Remove-ItemProperty -path "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters" -name "NV Hostname" 
          
          Set-ItemProperty -path "HKLM:\SYSTEM\CurrentControlSet\Control\Computername\Computername" -name "Computername" -value $ComputerName
          Set-ItemProperty -path "HKLM:\SYSTEM\CurrentControlSet\Control\Computername\ActiveComputername" -name "Computername" -value $ComputerName
          Set-ItemProperty -path "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters" -name "Hostname" -value $ComputerName
          Set-ItemProperty -path "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters" -name "NV Hostname" -value  $ComputerName
          Set-ItemProperty -path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" -name "AltDefaultDomainName" -value $ComputerName
          Set-ItemProperty -path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" -name "DefaultDomainName" -value $ComputerName
          Set-ItemProperty -path "HKLM:\HARDWARE\DESCRIPTION\System\CentralProcessor\0" -name "ProcessorNameString" -value $ComputerName
          Set-ItemProperty -path "HKLM:\HARDWARE\DESCRIPTION\System\CentralProcessor\1" -name "ProcessorNameString" -value $ComputerName
          
      - name: Configure Core RDP Settings
        run: |
          # Enable Remote Desktop and disable Network Level Authentication (if needed)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          # Remove any existing rule with the same name to avoid duplication
          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          
          # For testing, allow any incoming connection on port 3389
          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389

          # (Optional) Restart the Remote Desktop service to ensure changes take effect
          Restart-Service -Name TermService -Force

      # --- NEW STEP: Run Python script AFTER RDP setup ---
      - name: Run Python Script
        run: |
          # text.py is in the same folder as the .yml file (root of repo)
          python text.py '${{ toJson(github.event.client_payload) }}'
          
